model:
  pre_restoration: True
  swinir:
    target: model.swinir.SwinIR
    params:
      img_size: 64
      patch_size: 1
      in_chans: 3
      embed_dim: 180
      depths: [3, 3, 3, 3]
      num_heads: [6, 6, 6, 6]
      window_size: 8
      mlp_ratio: 2
      sf: 8
      img_range: 1.0
      upsampler: "nearest+conv"
      resi_connection: "1conv"
      unshuffle: True
      unshuffle_scale: 8

  titok:
    pretrained: yucornetto/tokenizer_titok_sl256_vq8k_imagenet

  token_predictor:
    target: model.token_predictor.TokenPredictor
    params:
      d_model: 512
      n_heads: 8
      n_layers: 6

  # Classification models
  teacher_clsnet:
    target: model.resnet.ResNet
    params:
      type: 18
      num_classes: 1000
  
  clsnet:
    target: model.resnet.ResNet
    params:
      type: 18
      num_classes: 1000

  # Detection models
  teacher_detnet:
    target: model.faster_rcnn.fasterrcnn_mobilenet_v3_large_fpn
    params:
      weights_backbone: MobileNet_V3_Large_Weights.IMAGENET1K_V1
      num_classes: 21
  
  detnet:
    target: model.faster_rcnn.fasterrcnn_mobilenet_v3_large_fpn
    params:
      weights_backbone: MobileNet_V3_Large_Weights.IMAGENET1K_V1
      num_classes: 21

  # Segmentation models
  teacher_segnet:
    target: model.deeplabv3.deeplabv3_mobilenet_v3_large
    params:
      weights_backbone: MobileNet_V3_Large_Weights.IMAGENET1K_V1
      num_classes: 21
      aux_loss: false
  
  segnet:
    target: model.deeplabv3.deeplabv3_mobilenet_v3_large
    params:
      weights_backbone: MobileNet_V3_Large_Weights.IMAGENET1K_V1
      num_classes: 21
      aux_loss: false

dataset:
  cls:
    train:
      target: datasets.classification.DegradedClassificationDataset
      params:
        root: ./datasets/source/Imagenet/train
        file_backend_cfg:
          target: datasets.file_backend.HardDiskBackend
        gt_size: 576
        out_size: 512
        hflip: true
        rotation: false
        crop_type: random
        blur_kernel_size: 41
        kernel_list: ['iso', 'aniso']
        kernel_prob: [0.5, 0.5]
        blur_sigma: [0.1, 8]
        downsample_range: [1, 16]
        noise_range: [0, 10]
        jpeg_range: [50, 100]
    val:
      target: datasets.classification.PairedClassificationDataset
      params:
        root: ./datasets/source/Imagenet/val-mixb
        file_backend_cfg:
          target: datasets.file_backend.HardDiskBackend

  det:
    train:
      target: datasets.detection.DegradedDetectionDataset
      params:
        root: ./datasets/source/VOC
        year: '2012'
        image_set: train
        file_backend_cfg:
          target: datasets.file_backend.HardDiskBackend
        gt_size: 512
        out_size: 512
        hflip: true
        rotation: false
        crop_type: none
        blur_kernel_size: 41
        kernel_list: ['iso', 'aniso']
        kernel_prob: [0.5, 0.5]
        blur_sigma: [0.1, 8]
        downsample_range: [1, 16]
        noise_range: [0, 10]
        jpeg_range: [50, 100]
    val:
      target: datasets.detection.PairedDetectionDataset
      params:
        root: ./datasets/source/VOC
        path: JPEGImagesDet-mixb
        gt_size: 512
        year: '2012'
        image_set: val
        file_backend_cfg:
          target: datasets.file_backend.HardDiskBackend

  seg:
    train:
      target: datasets.segmentation.DegradedSegmentationDataset
      params:
        root: ./datasets/source/VOC
        year: '2012'
        image_set: train
        file_backend_cfg:
          target: datasets.file_backend.HardDiskBackend
        gt_size: 560
        resize_range: [0.5, 2.0]
        out_size: 512
        crop_type: random
        hflip: true
        rotation: false
        blur_kernel_size: 41
        kernel_list: ['iso', 'aniso']
        kernel_prob: [0.5, 0.5]
        blur_sigma: [0.1, 8]
        downsample_range: [1, 16]
        noise_range: [0, 10]
        jpeg_range: [50, 100]
    val:
      target: datasets.segmentation.PairedSegmentationDataset
      params:
        root: ./datasets/source/VOC
        path: JPEGImagesSeg-mixb
        year: '2012'
        image_set: val
        file_backend_cfg:
          target: datasets.file_backend.HardDiskBackend

train:
  seed: 7777
  precision: fp16
  exp_dir: experiments/joint/tasktok_sl256
  
  # Model checkpoints
  resume_swinir: weights/codeformer_swinir_tiny.pt
  resume_tasktok: ~
  resume_token_predictor: ~
  greedy_token_order: experiments/greedy_search_sl256/greedy_token_order.pt
  resume_teacher_clsnet: ResNet18_Weights.IMAGENET1K_V1
  resume_clsnet: ResNet18_Weights.IMAGENET1K_V1
  resume_teacher_detnet: weights/detnet_oracle.pt
  resume_detnet: weights/detnet_oracle.pt
  resume_teacher_segnet: weights/segnet_oracle.pt
  resume_segnet: weights/segnet_oracle.pt
  strict_load: true
  
  # Learning rates
  learning_rate_tasktok: 1e-5
  learning_rate_token_predictor: 1e-4
  learning_rate_token_switch: 1e-3
  learning_rate_clsnet: 5e-3
  learning_rate_detnet: 5e-3
  learning_rate_segnet: 1e-3
  
  # Loss weights
  weight_hlf: 1.0
  weight_ce: 1.0
  weight_det: 1.0
  weight_fm: 0.5
  ## ---tasktok---
  weight_tok: 0.1
  weight_mask: 0.5
  
  # Batch sizes
  batch_size_cls: 16
  batch_size_det: 8
  batch_size_seg: 8
  aspect_ratio_group_factor: 3
  
  # Training settings
  num_workers: 8
  train_steps: 140000
  task_sampling_ratio: [2, 1, 1]  # Task sampling ratio [cls, det, seg] tuned for balanced convergence
  log_every: 100
  ckpt_every: 70000
  image_every: 1000

val:
  batch_size_cls: 8
  batch_size_det: 1
  batch_size_seg: 1
  num_workers: 4
  val_every: 10000
